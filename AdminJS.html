    var colCash=(Number(b.rentCash)||0)+(Number(b.depositCash)||0), colUPI=(Number(b.rentUPI)||0)+(Number(b.depositUPI)||0);
    window._cancelCtx.colCash=colCash; window._cancelCtx.colUPI=colUPI;
    var body='<div style="display:flex;gap:11px;align-items:center;background:var(--terra-tint);border:1px solid var(--terra);border-radius:13px;padding:12px 15px;margin-bottom:16px;"><div style="font-size:13px;color:var(--terra);font-weight:600;">This booking already collected money. Choose how much to refund the guest, then cancel.</div></div>'
      +'<div class="summary" style="margin-bottom:6px;"><div class="sr"><span style="color:var(--muted);">Collected · cash</span><span style="font-weight:600;">'+inr(colCash)+'</span></div>'
      +'<div class="sr"><span style="color:var(--muted);">Collected · UPI</span><span style="font-weight:600;">'+inr(colUPI)+'</span></div></div>'
      +'<div class="gf" style="margin-top:14px;">'
      +'<div><label class="field-label">Refund cash (₹)</label><input id="cancel-rcash" class="field" type="number" min="0" max="'+colCash+'" value="'+colCash+'"></div>'
      +'<div><label class="field-label">Refund UPI (₹)</label><input id="cancel-rupi" class="field" type="number" min="0" max="'+colUPI+'" value="'+colUPI+'"></div></div>'
      +'<div id="cancel-note" style="font-size:12.5px;margin-top:8px;"></div>'
      +'<label class="field-label" style="margin-top:14px;">Reason *</label><input id="cancel-reason" class="field" placeholder="Why is this being cancelled?">';
    openModal('Cancel booking', b.riderName+' · '+bookingId, body, '<button class="btn-ghost-lg" data-action="modal-close">Keep booking</button><button class="btn-lg danger" data-action="cancel-submit">Cancel &amp; refund</button>');
    ['cancel-rcash','cancel-rupi'].forEach(function(idd){ var el=$(idd); if(el) el.oninput=cancelNote; });
    cancelNote();
  }
  function cancelNote(){
    var ctx=window._cancelCtx; if(!ctx||!ctx.b||ctx.b.status!=='Active') return;
    var rc=Number(val('cancel-rcash'))||0, ru=Number(val('cancel-rupi'))||0, note=$('cancel-note'); if(!note) return;
    if(rc>ctx.colCash){ note.textContent='Cash refund exceeds the '+inr(ctx.colCash)+' collected.'; note.style.color='var(--terra)'; }
    else if(ru>ctx.colUPI){ note.textContent='UPI refund exceeds the '+inr(ctx.colUPI)+' collected.'; note.style.color='var(--terra)'; }
    else { note.textContent='Refunding '+inr(rc+ru)+' · keeping '+inr((ctx.colCash+ctx.colUPI)-(rc+ru))+'.'; note.style.color='var(--muted-2)'; }
  }
  function submitCancel(){
    var ctx=window._cancelCtx||{}, b=ctx.b, active=(b&&b.status==='Active');
    var reason=val('cancel-reason');
    var refund=null;
    if(active){
      if(!reason){ flash('A reason is required to cancel a paid booking.', true); return; }
      var rc=Number(val('cancel-rcash'))||0, ru=Number(val('cancel-rupi'))||0;
      if(rc<0||ru<0){ flash('Refund amounts cannot be negative.', true); return; }
      if(rc>ctx.colCash+1){ flash('Cash refund cannot exceed the cash collected ('+inr(ctx.colCash)+').', true); return; }
      if(ru>ctx.colUPI+1){ flash('UPI refund cannot exceed the UPI collected ('+inr(ctx.colUPI)+').', true); return; }
      refund={ cash:rc, upi:ru };
    }
    flash('Cancelling…');
    return call('cancelBooking',[window._cancelCtx.b.bookingId, reason||'Cancelled', refund, A.token]).then(function(res){
      closeModal();
      flash((res&&res.refundTotal>0)?('Booking cancelled · '+inr(res.refundTotal)+' refunded.'):'Booking cancelled.');
      silentRefresh();
    }).catch(function(e){ flash(errMsg(e), true); });
  }

  // ── Extend (move the return date later) ──
  // Recomputes days/rent/deposit on the booking's own snapshot rates and (for an Active
  // booking) collects the extra now — mirroring the server in extendBooking().
  function ymdPlus(ymd, n){ var p=String(ymd||'').split('-'); if(p.length!==3) return ''; var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]+n)); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
  function openExtend(bookingId){
    var b=(C.bookings||[]).filter(function(x){return x.bookingId===bookingId;})[0];
    if(!b){ flash('Booking not found — refreshing.', true); silentRefresh(); return; }
    if(b.status!=='Active' && b.status!=='Pending'){ flash('Only an active or pending booking can be extended.', true); return; }
    if(!b.checkInYmd || !b.checkOutYmd){ flash('This booking is missing its dates — refreshing.', true); silentRefresh(); return; }
    window._extCtx={ b:b, method:'cash', addRent:0, addDeposit:0, addTotal:0 };
    var minOut=ymdPlus(b.checkOutYmd,1);
    var body='<div style="display:flex;gap:11px;align-items:center;background:var(--pine-tint);border:1px solid var(--pine-line);border-radius:13px;padding:13px 15px;margin-bottom:16px;"><span style="flex:none;color:var(--pine);display:flex;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span><div style="font-size:13.5px;color:var(--txt-2);">Currently due <b>'+esc(b.checkOut)+'</b>'+(b.vehicleLabel?' · '+esc(b.vehicleLabel):'')+'. Pick a later return date.</div></div>'
      +'<label class="field-label">New return date</label><input id="ex-date" class="field" type="date" min="'+minOut+'" value="'+minOut+'">'
      +'<div class="summary" id="ex-sum"></div>'
      +'<div id="ex-pay" class="hidden"><div style="margin:18px 0 8px;"><label class="field-label">Collect the extra by</label><div style="display:flex;gap:9px;"><button class="seg on" data-action="ex-method" data-m="cash">Cash</button><button class="seg" data-action="ex-method" data-m="upi">UPI</button><button class="seg" data-action="ex-method" data-m="split">Split</button></div></div>'
      +'<div id="ex-split" class="hidden"><div class="gf"><div><label class="field-label">Cash (₹)</label><input id="ex-cash" class="field" type="number" placeholder="0"></div><div><label class="field-label">UPI (₹)</label><input id="ex-upi" class="field" type="number" placeholder="0"></div></div><div id="ex-splitnote" style="font-size:12.5px;margin-top:8px;"></div></div></div>'
      +(b.status==='Pending'?'<div style="font-size:12.5px;color:var(--muted-2);margin-top:12px;">Nothing is collected now — the larger amount is taken when you confirm &amp; hand over.</div>':'');
    var footer='<button class="btn-ghost-lg" data-action="modal-close">Cancel</button><button class="btn-lg" data-action="ex-submit">Extend rental</button>';
    openModal('Extend rental', b.riderName+' · '+b.bookingId, body, footer);
    ['ex-cash','ex-upi'].forEach(function(idd){ var el=$(idd); if(el) el.oninput=exSplitNote; });
    $('ex-date').oninput=exRecalc; exRecalc();
  }
  function exRecalc(){
    var ctx=window._extCtx; if(!ctx) return; var b=ctx.b, newOut=val('ex-date');
    var dayRate=Number(b.dayRateSnap)||Number((C.settings&&C.settings.dayRate)||300);
    var depW=Number(b.depositPerWeekSnap)||Number((C.settings&&C.settings.depositPerWeek)||2000);
    var newDays=window.Sthira.daysInclusive(b.checkInYmd, newOut);
    var addDays=newDays-(Number(b.days)||1);
    var newRent=dayRate*newDays, newDeposit=depW*Math.ceil(newDays/7);
    ctx.addRent=Math.max(0,newRent-(Number(b.rentAmount)||0));
    ctx.addDeposit=Math.max(0,newDeposit-(Number(b.depositAmount)||0));
    ctx.addTotal=ctx.addRent+ctx.addDeposit;
    var valid=newOut && newOut>b.checkOutYmd;
    var sum=$('ex-sum');
    if(sum) sum.innerHTML = valid
      ? '<div class="sr"><span style="color:var(--muted);">Extra days</span><span style="font-weight:600;">+'+addDays+' day'+(addDays===1?'':'s')+'</span></div>'
        +'<div class="sr"><span style="color:var(--muted);">Extra rent</span><span style="font-weight:600;">'+inr(ctx.addRent)+'</span></div>'
        +(ctx.addDeposit>0?'<div class="sr"><span style="color:var(--muted);">Extra deposit (held)</span><span style="font-weight:600;">'+inr(ctx.addDeposit)+'</span></div>':'')
        +'<div class="sr total"><span style="font-weight:600;">'+(b.status==='Active'?'To collect now':'Added to total')+'</span><span class="amt">'+inr(ctx.addTotal)+'</span></div>'
      : '<div class="sr"><span style="color:var(--terra);">Pick a date later than '+esc(b.checkOut)+'.</span></div>';
    var pay=$('ex-pay'); if(pay) pay.classList.toggle('hidden', !(b.status==='Active' && valid && ctx.addTotal>0));
    exSplitNote();

  // Printable deposit/refund receipt — builds a self-contained .print-receipt block,
  // appends it to <body>, prints ONLY it via @media print, then cleans up on afterprint.
  function printReceipt(bookingId){
    var b=(C.bookings||[]).filter(function(x){return x.bookingId===bookingId;})[0];
    if(!b){ flash('Booking not found — refreshing.', true); silentRefresh(); return; }
    var hasCash=((b.rentCash||0)+(b.depositCash||0))>0, hasUPI=((b.rentUPI||0)+(b.depositUPI||0))>0;
    var payMode=(hasCash&&hasUPI)?'Cash + UPI':(hasUPI?'UPI':(hasCash?'Cash':'—'));
    var returned=(b.status==='Returned');
    var rent=Number(b.rentAmount)||0, dep=Number(b.depositAmount)||0;
    var lateFee=Number(b.lateFee)||0, ded=Number(b.deductionTotal)||0, refund=Number(b.refundTotal)||0;
    function line(label, value, opt){ return '<div class="pr-line'+(opt&&opt.total?' pr-total':'')+(opt&&opt.minus?' pr-minus':'')+'"><span>'+esc(label)+'</span><span>'+esc(value)+'</span></div>'; }
    var rows=line('Rent', inr(rent))+line('Deposit held', inr(dep))+line('Total collected', inr(rent+dep), {total:true});
    if(returned){
      rows+='<div class="pr-rule"></div>';
      if(lateFee>0) rows+=line('Late fee', '− '+inr(lateFee), {minus:true});
      if(ded>0) rows+=line('Deductions', '− '+inr(ded), {minus:true});
      rows+=line('Deposit held', inr(dep))
        +line('Refund paid to guest', inr(refund), {total:true});
    }
    var meta=[['Booking', b.bookingId], ['Guest', b.riderName], ['Cottage / stay', b.cottageName||'—'],
      ['Scooter', b.vehicleLabel||'—'], ['Check-in', b.checkIn||'—'], ['Return by', b.checkOut||'—'],
      ['Payment mode', payMode]];
    if(returned && b.actualReturn) meta.push(['Returned at', b.actualReturn]);
    var metaHtml=meta.map(function(m){ return '<div class="pr-meta-row"><span>'+esc(m[0])+'</span><span>'+esc(m[1])+'</span></div>'; }).join('');
    var host=document.createElement('div');
    host.className='print-receipt';
    host.innerHTML='<div class="pr-head"><div class="pr-brand">Sthira</div><div class="pr-sub">EV Rental · Receipt</div></div>'
      +'<div class="pr-meta">'+metaHtml+'</div>'
      +'<div class="pr-money">'+rows+'</div>'
      +'<div class="pr-foot">Printed '+esc(todayStr())+' · '+esc(returned?'Returned & settled':'Active rental')+'. Thank you for riding with Sthira.</div>';
    document.body.appendChild(host);
    document.body.classList.add('printing');
    function cleanup(){ document.body.classList.remove('printing'); if(host&&host.parentNode) host.parentNode.removeChild(host); window.removeEventListener('afterprint', cleanup); }
    window.addEventListener('afterprint', cleanup);
    window.print();
    // Safety net for browsers that don't fire afterprint reliably.
    setTimeout(function(){ if(document.body.classList.contains('printing')) cleanup(); }, 1500);
  }

  function sendTest(){ var to=val('test-email'); if(!to||to.indexOf('@')<0){ flash('Enter a valid email.', true); return; } flash('Sending test…'); return call('sendTestEmail',[to, A.token]).then(function(){ flash('Test email sent to '+to+'.'); }).catch(function(e){ flash(errMsg(e), true); }); }

  function mapUseDrive(){
    var body='<p style="font-size:14px;color:var(--muted);margin:0 0 12px;">Paste a Google Drive share link (or file ID) of your map image. Make sure it\'s an image you can open.</p><label class="field-label">Drive link or file ID</label><input id="md-link" class="field" placeholder="https://drive.google.com/file/d/…">';
    openModal('Use a Drive image','The map shows on the guest form and embeds in emails', body, '<button class="btn-ghost-lg" data-action="modal-close">Cancel</button><button class="btn-lg" data-action="md-submit">Use this image</button>');
  }
  function submitMapDrive(){ var link=val('md-link'); if(!link){ flash('Paste a Drive link or file ID.', true); return; } flash('Setting map…'); return call('useMapFromDrive',[link, A.token]).then(function(){ closeModal(); flash('Map image set ✓'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); }); }

  // ════════ OPTIMISTIC LIGHT MUTATIONS ════════
  function vehToggle(id, status, point){
    beginMut();
    var wasCharging=false;
    (C.vehicles||[]).forEach(function(v){ if(v.vehicleId===id){
      wasCharging=(v.status==='Charging'); v.status=status;
      if(status==='Charging' && point) v.location=point;
      else if(status!=='Charging' && wasCharging) v.location='';
    } });
    A._settleId=id; renderFleet(); flash('Scooter updated.');
    var p=call('setVehicleStatus',[id, status, A.token]);
    if(status==='Charging' && point) p=p.then(function(){ return call('setVehicleLocation',[id, point, A.token]); });
    else if(status!=='Charging' && wasCharging) p=p.then(function(){ return call('setVehicleLocation',[id, '', A.token]); });
    p.then(function(){ endMut(); silentRefresh(); }).catch(function(e){ endMut(); flash(errMsg(e), true); silentRefresh(); });
  }
  function vehDelete(id){
    if(!confirm('Are you sure you want to remove this vehicle?')) return;
    // Let the card fade out on screen first, then do the actual optimistic
    // removal + server call — a full innerHTML rebuild can't animate a node
    // that's already gone, so the paint is deferred behind the animation only
    // (the mutation/server-call timing itself is unchanged once triggered).
    animateCardLeave('view-fleet', id, function(){
      beginMut();
      C.vehicles=(C.vehicles||[]).filter(function(v){ return v.vehicleId!==id; }); renderFleet(); flash('Scooter removed.');
      call('deleteVehicle',[id, A.token]).then(function(){ endMut(); silentRefresh(); }).catch(function(e){ endMut(); flash(errMsg(e), true); silentRefresh(); });
    });
  }
  // Edit a vehicle (label / type / status / notes) — also "allocate to staff".
  function openEditVehicle(id){
    var v=(C.vehicles||[]).filter(function(x){return x.vehicleId===id;})[0];
    if(!v){ flash('Vehicle not found — refreshing.', true); silentRefresh(); return; }
    if(v.status==='Out'){ flash('This scooter is on rent — return it first to edit.', true); return; }
    window._veditId=id;
    var typeOpts=['Rental','Staff'].map(function(t){return '<option'+(v.type===t?' selected':'')+'>'+t+'</option>';}).join('');
    var statOpts=['Available','Charging','Maintenance','Staff'].map(function(s){return '<option'+(v.status===s?' selected':'')+'>'+s+'</option>';}).join('');
    var body='<div class="gf"><div class="full"><label class="field-label">Scooter number / label</label><input id="ve-label" class="field" value="'+esc(v.label)+'" style="font-family:var(--mono);"></div>'
      +'<div><label class="field-label">Type</label><select id="ve-type" class="field">'+typeOpts+'</select></div>'
      +'<div><label class="field-label">Status</label><select id="ve-status" class="field">'+statOpts+'</select></div>'
      +'<div class="full"><label class="field-label">Location</label><input id="ve-location" class="field" value="'+esc(v.location||'')+'" placeholder="e.g. Yard / Charging point"></div>'
      +'<div class="full"><label class="field-label">Notes</label><input id="ve-notes" class="field" value="'+esc(v.notes||'')+'" placeholder="Optional"></div></div>'
      +'<div style="font-size:12.5px;color:var(--muted-2);margin-top:10px;">Set type <b>Staff</b> (and status Staff) to allocate this scooter for internal use — it won\'t be offered to guests.</div>';
    openModal('Edit vehicle', v.label, body, '<button class="btn-ghost-lg" data-action="modal-close">Cancel</button><button class="btn-lg" data-action="ve-submit">Save changes</button>');
  }
  function submitEditVehicle(){
    var id=window._veditId, label=val('ve-label'); if(!label){ flash('Enter a scooter number.', true); return; }
    var type=val('ve-type'), status=val('ve-status'), notes=val('ve-notes'), location=val('ve-location');
    if((C.vehicles||[]).some(function(v){ return v.vehicleId!==id && String(v.label||'').trim().toLowerCase()===label.toLowerCase(); })){ flash('Another scooter “'+label+'” already exists.', true); return; }
    flash('Saving…');
    return call('updateVehicle',[id, { label:label, type:type, status:status, notes:notes, location:location }, A.token]).then(function(){ closeModal(); flash('Vehicle updated.'); silentRefresh(); }).catch(function(e){ flash(errMsg(e), true); });
  }
  function settingsAddOperator(){
    var nm=val('op-newname'), pin=val('op-newpin').replace(/\D/g,'');
    // NOTE: addOperator's server-side role guard (Cash.gs, out of scope for this
    // change) currently only recognizes 'Supervisor' vs. 'Operator' — a 'Yard' pick
    // here is sent through but the server will store it as 'Operator' until Cash.gs
    // is updated to accept it too. Sent as-is so this becomes a one-line server fix.
    var roleSel=val('op-newrole');
    var role=(roleSel==='Supervisor')?'Supervisor':(roleSel==='Yard'?'Yard':'Operator');
    if(!nm){ flash('Enter the operator name.', true); return; }
    if(pin.length!==6){ flash('Set a 6-digit PIN for the operator.', true); return; }
    A.mutateEpoch++;
    C.operators=(C.operators||[]).concat([{ operatorId:'tmp', name:nm, role:role, active:true }]); renderSettings(); flash('Saving…');
    return call('addOperator',[nm, pin, role, A.token]).then(function(){ flash(nm+' added'+(role==='Supervisor'?' as supervisor.':'.')); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function settingsSetRole(id, role){
    var safe=(role==='Supervisor')?'Supervisor':'Operator';
    (C.operators||[]).forEach(function(o){ if(o.operatorId===id) o.role=safe; }); renderSettings(); flash('Saving…');
    return call('setOperatorRole',[id, safe, A.token]).then(function(){ flash('Role updated to '+safe+'.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function saveSupPowers(){
    var u={ supViewMoney:$('set-sup-money').checked?'yes':'no', supViewAllBookings:$('set-sup-bookings').checked?'yes':'no', supRunBookings:$('set-sup-run').checked?'yes':'no', supDeleteBookings:$('set-sup-delete').checked?'yes':'no' };
    Object.keys(u).forEach(function(k){ C.settings[k]=u[k]; }); flash('Saving…');
    return call('updateMultipleSettings',[u, A.operator, A.token]).then(function(){ flash('Supervisor powers saved.'); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function settingsSetPin(id){ var pin=val('op-pin-'+id).replace(/\D/g,''); if(pin.length!==6){ flash('PIN must be 6 digits.', true); return; } var inp=$('op-pin-'+id); if(inp) inp.value=''; flash('Saving…'); return call('setOperatorPin',[id, pin, A.token]).then(function(){ flash('PIN updated.'); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); }); }
  // Remove a user — cash-safe. If they still hold cash, the manager must choose how to
  // settle their drawer first (the server recomputes the balance authoritatively).
  function settingsRemoveOperator(id){
    var op=(C.operators||[]).filter(function(o){ return o.operatorId===id; })[0];
    var nm=op?op.name:'';
    var bal=0; ((C.drawers&&C.drawers.operators)||[]).forEach(function(o){ if(o.name===nm) bal=o.balance||0; });
    if(bal>0.5){ openRemoveSettle(id, nm, bal); return; }
    doRemoveOperator(id, '', nm);
  }
  function doRemoveOperator(id, settleMode, nm){
    C.operators=(C.operators||[]).filter(function(o){ return o.operatorId!==id; }); renderSettings(); flash('Removing…');
    return call('removeOperator',[id, settleMode, A.token]).then(function(){ flash((nm||'Operator')+' removed.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function openRemoveSettle(id, nm, bal){
    window._rmId=id; window._rmNm=nm;
    var mgrLabel=(C.settings&&C.settings.managerLabel)||(C.dashboard&&C.dashboard.managerLabel)||'Manager';
    var body='<p style="font-size:14px;color:var(--muted);margin:0 0 14px;"><b>'+esc(nm)+'</b> still holds <b>'+inr(bal)+'</b> in their drawer. Settle it before removing — the ledger keeps every past entry; this only appends the settlement (who did it &amp; whose drawer).</p>'
      +'<div style="display:flex;flex-direction:column;gap:10px;">'
      +'<button class="btn" data-action="rm-absorb" style="text-align:left;border:1px solid var(--line-3);background:var(--surface);color:var(--txt-2);font-weight:600;padding:13px 16px;border-radius:12px;">Move to '+esc(mgrLabel)+'’s drawer<span style="display:block;font-weight:500;color:var(--muted-2);font-size:12.5px;">Internal transfer — total cash on hand is unchanged.</span></button>'
      +'<button class="btn" data-action="rm-relieve" style="text-align:left;border:1px solid var(--line-3);background:var(--surface);color:var(--txt-2);font-weight:600;padding:13px 16px;border-radius:12px;">Relieve to company<span style="display:block;font-weight:500;color:var(--muted-2);font-size:12.5px;">Cash leaves the desk — total cash on hand drops by '+inr(bal)+'.</span></button>'
      +'</div>';
    openModal('Remove '+nm, 'Settle their drawer first', body, '<button class="btn-ghost-lg" data-action="modal-close">Cancel</button>');
  }
  function settingsAddCottage(){ var nm=val('cot-newname'); if(!nm) return; C.cottages=(C.cottages||[]).concat([{ cottageId:'tmp', name:nm, active:true }]); renderSettings(); flash('Saving…'); return call('addCottage',[nm, A.token]).then(function(){ flash(nm+' added.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); }); }
  function settingsRemoveCottage(id){ C.cottages=(C.cottages||[]).filter(function(c){ return c.cottageId!==id; }); renderSettings(); flash('Removing…'); return call('deactivateCottage',[id, A.token]).then(function(){ flash('Cottage removed.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); }); }
  // Charging points are a single manager-only Settings key (newline-delimited) — no
  // dedicated server function, same pattern as other Settings values (updateMultipleSettings).
  function settingsAddChargingPoint(){
    var nm=val('cp-newname'); if(!nm) return;
    var joined=chargingPointsList().concat([nm]).join('\n');
    C.settings=C.settings||{}; C.settings.chargingPoints=joined;
    renderSettings(); flash('Saving…');
    return call('updateMultipleSettings',[{chargingPoints:joined}, A.operator, A.token]).then(function(){ flash(nm+' added.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function settingsRemoveChargingPoint(idx){
    var list=chargingPointsList(); list.splice(Number(idx),1);
    var joined=list.join('\n');
    C.settings=C.settings||{}; C.settings.chargingPoints=joined;
    renderSettings(); flash('Removing…');
    return call('updateMultipleSettings',[{chargingPoints:joined}, A.operator, A.token]).then(function(){ flash('Charging point removed.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  // Locations — same newline-delimited Settings key pattern as charging points.
  function settingsAddLocation(){
    var nm=val('loc-newname'); if(!nm) return;
    var joined=locationsList().concat([nm]).join('\n');
    C.settings=C.settings||{}; C.settings.locations=joined;
    renderSettings(); flash('Saving…');
    return call('updateMultipleSettings',[{locations:joined}, A.operator, A.token]).then(function(){ flash(nm+' added.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }
  function settingsRemoveLocation(idx){
    var list=locationsList(); list.splice(Number(idx),1);
    var joined=list.join('\n');
    C.settings=C.settings||{}; C.settings.locations=joined;
    renderSettings(); flash('Removing…');
    return call('updateMultipleSettings',[{locations:joined}, A.operator, A.token]).then(function(){ flash('Location removed.'); silentRefresh({settings:true}); }).catch(function(e){ flash(errMsg(e), true); silentRefresh({settings:true}); });
  }

  function copyLink(){ var el=$('guest-link'); if(!el) return; el.select(); try{ document.execCommand('copy'); flash('Link copied.'); }catch(e){ flash('Select and copy the link.'); } }
  function openSheet(){ flash('Opening spreadsheet…'); call('getSpreadsheetUrl',[A.token]).then(function(u){ if(u) window.open(u,'_blank'); else flash('Spreadsheet URL unavailable.', true); }).catch(function(e){ flash(errMsg(e), true); }); }
  function doLogout(){ A.authGen++; var tk=A.token; A.token=null; C=null; A.yardSeen={}; A._yardSeeded=false; clearInterval(refreshTimer); clearSession(); call('adminLogout',[tk]).catch(function(){}); flash('Locked.'); showLogin(); }

  // ════════ DELEGATED CLICKS ════════
  function onDelegateClick(e){
    var t=e.target.closest('[data-action]'); if(!t) return;
    var act=t.getAttribute('data-action'), id=t.getAttribute('data-id');
    switch(act){
      case 'modal-bg': closeModal(); break;
      case 'modal-stop': e.stopPropagation(); break;
      case 'modal-close': closeModal(); break;
      case 'goto': gotoView(t.getAttribute('data-view')); break;
      case 'btab': A.bTab=t.getAttribute('data-tab'); A.search=''; renderBookings(); break;
      case 'bk-filters-toggle': toggleFilters(); break;
      case 'bk-filter-clear': clearBookingFilters(); break;
      case 'period': A.period=t.getAttribute('data-p'); renderReports(); break;
      case 'settab': A.setTab=t.getAttribute('data-t'); renderSettings(); break;
      case 'bk-details': openBookingDetails(id); break;
      case 'cf-from-details': closeModal(); openConfirm(id); break;
      case 'rt-from-details': closeModal(); openReturn(id); break;
      case 'cn-from-details': closeModal(); openCancel(id); break;
      case 'ex-from-details': closeModal(); openExtend(id); break;
      case 'ex-method': exMethod(t.getAttribute('data-m')); break;
      case 'ex-submit': withBtn(t, submitExtend()); break;
      case 'ed-from-details': closeModal(); openEditBooking(id); break;
      case 'eb-submit': withBtn(t, submitEditBooking()); break;
      case 'veh-occupant': openOccupantBooking(id); break;
      case 'cancel-submit': withBtn(t, submitCancel()); break;
      case 'handover': openHandover(); break;
      case 'ho-all': $('ho-amt').value=window._hoCash; break;
      case 'ho-submit': withBtn(t, submitHandover()); break;
      case 'add-vehicle': openAddVehicle(); break;
      case 'av-submit': withBtn(t, submitAddVehicle()); break;
      case 'veh-toggle': (t.getAttribute('data-status')==='Charging') ? openChargePicker('fleet', id) : vehToggle(id, t.getAttribute('data-status')); break;
      case 'veh-edit': openEditVehicle(id); break;
      case 've-submit': withBtn(t, submitEditVehicle()); break;
      case 'veh-delete': vehDelete(id); break;
      case 'yard-handover': openYardHandover(id); break;
      case 'yard-hnd-pick': submitYardHandover(t.getAttribute('data-loc')); break;
      case 'yard-hnd-skip': submitYardHandover(''); break;
      case 'yard-toggle': (t.getAttribute('data-status')==='Charging') ? openChargePicker('yard', id) : yardVehToggle(id, t.getAttribute('data-status')); break;
      case 'yard-location': openYardLocation(id); break;
      case 'yard-loc-pick': withBtn(t, submitYardLocation(t.getAttribute('data-loc'))); break;
      case 'charge-pt-pick': submitChargePoint(t.getAttribute('data-pt')); break;
      case 'yard-chip': A.yardFilter=(A.yardFilter===t.getAttribute('data-status'))?'':t.getAttribute('data-status'); renderYard(); break;
      case 'yard-sort': A.yardSortAlpha=!A.yardSortAlpha; renderYard(); break;
      case 'yard-out-details': openYardBookingDetails(id); break;
      case 'fleet-details': openFleetVehicleDetails(id); break;
      case 'fleet-chip': A.fleetFilter=(A.fleetFilter===t.getAttribute('data-status'))?'':t.getAttribute('data-status'); renderFleet(); break;
      case 'fleet-sort': A.fleetSortAlpha=!A.fleetSortAlpha; renderFleet(); break;
      case 'fleet-veh-toggle': closeModal(); vehToggle(id, t.getAttribute('data-status')); break;
      case 'yard-enable-alerts': yardEnableAlerts(); break;
      case 'yard-dismiss-banner': A.yardBannerDismissed=true; renderYard(); break;
      case 'ho-verify': withBtn(t, hoDecide(id, true)); break;
      case 'ho-reject': withBtn(t, hoDecide(id, false)); break;
      case 'led-period': A.ledgerPeriod=t.getAttribute('data-p'); A.ledgerFilterOp=''; renderMoney(); break;
      case 'led-more': fetchLedger(false); break;
      case 'led-operator': A.ledgerFilterOp=t.getAttribute('data-op'); renderMoney(); break;
      case 'led-clearfilter': A.ledgerFilterOp=''; renderMoney(); break;
      case 'refund': openRefund(); break;
      case 'rf-method': rfMethod(t.getAttribute('data-m')); break;
      case 'rf-submit': withBtn(t, submitRefund()); break;
      case 'relieve': openRelieve(); break;
      case 'rl-all': $('rl-amt').value=window._rlCash; break;
      case 'rl-submit': withBtn(t, submitRelieve()); break;
      case 'run-audit': withBtn(t, runAudit()); break;
      case 'day-closeout': openDayCloseout(); break;
      case 'closeout-audit': withBtn(t, runAudit()); break;
      case 'closeout-relieve': closeModal(); openRelieve(); break;
      case 'bk-receipt': printReceipt(id); break;
      case 'money-drill': openMoneyDrill(t.getAttribute('data-drill')); break;
      case 'add-past-booking': openAddPastBooking(); break;
      case 'pb-method': pbMethod(t.getAttribute('data-m')); break;
      case 'pb-submit': withBtn(t, submitAddPastBooking()); break;
      case 'bk-delete': openDeleteBooking(id); break;
      case 'del-submit': withBtn(t, submitDeleteBooking()); break;
      case 'save-reports': withBtn(t, saveReports()); break;
      case 'email-report': withBtn(t, emailReportNow()); break;
      case 'export-csv': exportCSV(); break;
      case 'op-setemail': withBtn(t, settingsSetEmail(id)); break;
      case 'save-powers': withBtn(t, savePowers()); break;
      case 'save-sup-powers': withBtn(t, saveSupPowers()); break;
      case 'op-setrole': settingsSetRole(id, t.getAttribute('data-role')); break;
      case 'rm-absorb': closeModal(); withBtn(t, doRemoveOperator(window._rmId, 'absorb', window._rmNm)); break;
      case 'rm-relieve': closeModal(); withBtn(t, doRemoveOperator(window._rmId, 'relieve', window._rmNm)); break;
      case 'nb-submit': withBtn(t, submitNewBooking()); break;
      case 'cf-method': cfMethod(t.getAttribute('data-m')); break;
      case 'cf-submit': withBtn(t, submitConfirm()); break;
      case 'rt-submit': withBtn(t, submitReturn()); break;
      case 'rt-method': rtMethod(t.getAttribute('data-m')); break;
      case 'save-pricing': withBtn(t, savePricing()); break;
      case 'save-access': withBtn(t, saveAccess()); break;
      case 'save-email': withBtn(t, saveEmail()); break;
      case 'send-test': withBtn(t, sendTest()); break;
      case 'map-computer': $('map-file').click(); break;
      case 'map-drive': mapUseDrive(); break;
      case 'md-submit': withBtn(t, submitMapDrive()); break;
      case 'op-add': settingsAddOperator(); break;
      case 'op-setpin': withBtn(t, settingsSetPin(id)); break;
      case 'op-remove': settingsRemoveOperator(id); break;
      case 'cot-add': settingsAddCottage(); break;
      case 'cot-remove': settingsRemoveCottage(id); break;
      case 'cp-add': settingsAddChargingPoint(); break;
      case 'cp-remove': settingsRemoveChargingPoint(t.getAttribute('data-idx')); break;
      case 'loc-add': settingsAddLocation(); break;
      case 'loc-remove': settingsRemoveLocation(t.getAttribute('data-idx')); break;
      case 'copy-link': copyLink(); break;
      case 'open-link': window.open((C&&C.webAppUrl||window.WEB_APP_URL||'')+(((C&&C.webAppUrl||window.WEB_APP_URL||'').indexOf('?')>=0)?'&':'?')+'mode=rider','_blank'); break;
      case 'open-sheet': openSheet(); break;
      case 'logout': doLogout(); break;
      case 'alert-go': if(_alertActions[+t.getAttribute('data-i')]){ closeModal(); _alertActions[+t.getAttribute('data-i')].go(); } break;
      case 'alert-ov': if(_alertActions[+t.getAttribute('data-i')]) _alertActions[+t.getAttribute('data-i')].go(); break;
    }
  }

  // ════════ GO ════════
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();
</script>
