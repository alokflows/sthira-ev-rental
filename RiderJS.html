<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  var SECTIONS = [];               // term sections from getTermsSections()
  var accepted = {};               // { sectionIndex: true }
  var undertaking = false;
  var rates = { dayRate: 300, depositPerWeek: 2000 };
  var submitting = false;
  var lastBooking = null;          // { res, payload } — powers Share / Copy on the success screen
  var toastTimer = null;
  // Kiosk mode (?kiosk=1): after a guest submits, auto-return to a blank form for the next person.
  var KIOSK = /[?&]kiosk=1/.test(location.search);
  var kioskTimer = null;

  // ── Element shortcuts ──────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }
  var els = {};
  ['formScreen','successScreen','termsContainer','termCount','undertakingToggle','undertakingCard',
   'footerBar','accCount','accTotal','footerHint','progFill','submitBtn','submitLabel','submitArrow',
   'toast','mapSection','mapImg','pricePreview','priceDays','priceRent','priceDep','resetBtn',
   'okFirstName','okRef','okRider','okCottage','okDates','okAcceptedAt','okEmailLine',
   'availBanner','availDot','availText','waShareBtn','copyDetailsBtn'].forEach(function (k) { els[k] = $(k); });

  var FIELDS = {
    name:      $('f-name'),
    license:   $('f-license'),
    cottage:   $('f-cottage'),
    mobile:    $('f-mobile'),
    altMobile: $('f-altMobile'),
    email:     $('f-email'),
    checkin:   $('f-checkin'),
    checkout:  $('f-checkout')
  };

  // ── Helpers ────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function flash(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { els.toast.classList.remove('show'); }, 3200);
  }

  function inr(n) {
    n = Math.round(Number(n) || 0);
    var s = String(Math.abs(n));
    var last3 = s.length > 3 ? s.slice(-3) : s;
    var rest = s.length > 3 ? s.slice(0, -3) : '';
    if (rest) rest = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',';
    return '₹' + rest + last3;
  }

  function fmtShort(d) {
    if (!d) return '—';
    try {
      return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    } catch (e) { return d; }
  }

  function daysBetween() {
    // Shared rule (SharedCalc.html) — same as the server. Runs locally = instant.
    return window.Sthira.daysInclusive(FIELDS.checkin.value, FIELDS.checkout.value);
  }

  // ── Render term cards ──────────────────────────────────────────────────
  function renderTerms() {
    var html = '';
    SECTIONS.forEach(function (sec, i) {
      html += '<section class="card term" data-idx="' + i + '">';
      // Number sits inline with the title (one header line), content flows full-width
      // below — keeps the card balanced instead of a tall empty left gutter.
      html += '<div style="display:flex;align-items:center;gap:13px;margin-bottom:12px;">';
      html += '<div class="num">' + esc(sec.n) + '</div>';
      html += '<h3 class="serif" style="font-size:20px;margin:0;line-height:1.2;flex:1;min-width:0;">' + esc(sec.title) + '</h3>';
      if (sec.strict) html += '<span class="badge-strict">Strictly enforced</span>';
      html += '</div>';

      (sec.points || []).forEach(function (p) {
        html += '<div class="point"><span class="bullet"></span><div class="txt">'
              + (p.lead ? '<b>' + esc(p.lead) + ' </b>' : '') + esc(p.text) + '</div></div>';
      });

      (sec.rows || []).forEach(function (r) {
        html += '<div class="row-zone"><div class="zone">' + esc(r.zone) + '</div>'
              + '<div class="rule">' + esc(r.rule) + '</div>';
        (r.subs || []).forEach(function (sub) {
          html += '<div class="sub"><span class="b">•</span>' + esc(sub) + '</div>';
        });
        html += '</div>';
      });

      html += '<button class="toggle accept-toggle" data-idx="' + i + '">'
            + '<span class="box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>'
            + '<span class="lbl">I have read and accept this</span></button>';

      html += '</section>';
    });
    els.termsContainer.innerHTML = html;
    els.termCount.textContent = SECTIONS.length;

    // wire toggles
    Array.prototype.forEach.call(els.termsContainer.querySelectorAll('.accept-toggle'), function (btn) {
      btn.addEventListener('click', function () { toggleTerm(parseInt(btn.getAttribute('data-idx'), 10)); });
    });
    updateProgress();
  }

  // Loads the term sections the form is built from. On failure SECTIONS stays empty,
  // which (by design, see allTermsAccepted) blocks submission — so a failed load must
  // never fail silently: show the error inline with a Retry that re-runs this same call.
  function loadTerms() {
    google.script.run
      .withSuccessHandler(function (secs) { SECTIONS = secs || []; renderTerms(); })
      .withFailureHandler(function () {
        els.termsContainer.innerHTML = '<div class="card" style="text-align:center;color:var(--terra);">'
          + 'Could not load terms.'
          + '<div style="margin-top:12px;"><button id="termsRetryBtn" class="btn btn-ghost" style="border:1px solid var(--line-3);font-size:14px;">Retry</button></div>'
          + '</div>';
        var rb = $('termsRetryBtn');
        if (rb) rb.addEventListener('click', loadTerms);
      })
      .getTermsSections();
  }

  function toggleTerm(i) {
    accepted[i] = !accepted[i];
    var card = els.termsContainer.querySelector('section.term[data-idx="' + i + '"]');
    var btn = els.termsContainer.querySelector('.accept-toggle[data-idx="' + i + '"]');
    if (card) card.classList.toggle('on', !!accepted[i]);
    if (btn) {
      btn.classList.toggle('on', !!accepted[i]);
      btn.querySelector('.lbl').textContent = accepted[i] ? 'Read & accepted' : 'I have read and accept this';
    }
    updateProgress();
  }

  function toggleUndertaking() {
    undertaking = !undertaking;
    els.undertakingToggle.classList.toggle('on', undertaking);
    els.undertakingCard.style.background = undertaking ? 'var(--pine-tint)' : 'var(--paper-hi)';
    els.undertakingCard.style.borderColor = undertaking ? 'var(--pine-line)' : 'var(--line-3)';
    updateProgress();
  }

  // ── Validation ─────────────────────────────────────────────────────────
  function missing() {
    var req = [
      ['name', 'rider name'], ['license', 'licence number'], ['cottage', 'cottage'],
      ['mobile', 'mobile number'],
      ['checkin', 'check-in date'], ['checkout', 'check-out date']
    ];
    return req.filter(function (pair) {
      return !String(FIELDS[pair[0]].value || '').trim();
    }).map(function (pair) { return pair[1]; });
  }

  function allTermsAccepted() {
    return SECTIONS.length > 0 && SECTIONS.every(function (_, i) { return accepted[i]; });
  }

  // ── Progress / footer ──────────────────────────────────────────────────
  function updateProgress() {
    var termsCount = SECTIONS.filter(function (_, i) { return accepted[i]; }).length;
    var totalRequired = SECTIONS.length + 1;                 // + undertaking
    var acceptedCount = termsCount + (undertaking ? 1 : 0);
    var allAcc = acceptedCount === totalRequired && SECTIONS.length > 0;
    var miss = missing();
    var ready = allAcc && miss.length === 0;
    var pct = totalRequired ? Math.round(acceptedCount / totalRequired * 100) : 0;

    els.accCount.textContent = acceptedCount;
    els.accTotal.textContent = totalRequired;
    els.progFill.style.width = pct + '%';
    els.progFill.classList.toggle('ready', ready);

    var hint = 'Ready to send', color = 'var(--pine-soft)';
    if (!allAcc) { hint = (totalRequired - acceptedCount) + ' left to accept'; color = 'var(--gold-deep)'; }
    else if (miss.length) { hint = 'Now fill your details'; color = 'var(--gold-deep)'; }
    els.footerHint.textContent = hint;
    els.footerHint.style.color = color;

    els.submitBtn.classList.toggle('is-disabled', !ready);
    return ready;
  }

  // ── Price preview ──────────────────────────────────────────────────────
  function updatePrice() {
    var ci = FIELDS.checkin.value, co = FIELDS.checkout.value;
    if (!ci || !co) { els.pricePreview.classList.add('hidden'); return; }
    var p = window.Sthira.pricePreview(daysBetween(), rates.dayRate, rates.depositPerWeek);
    els.priceDays.textContent = p.days;
    els.priceRent.textContent = inr(p.rent);
    els.priceDep.textContent = inr(p.deposit);
    els.pricePreview.classList.remove('hidden');
  }

  // ── Submit ─────────────────────────────────────────────────────────────
  function submit() {
    if (submitting) return;
    if (!allTermsAccepted()) { flash('Please read and accept all ' + SECTIONS.length + ' sections first.'); return; }
    if (!undertaking) { flash('Please agree to the rider undertaking.'); return; }
    var miss = missing();
    if (miss.length) {
      flash('Please fill your ' + miss.slice(0, 2).join(' and ') + (miss.length > 2 ? ', …' : '') + '.');
      return;
    }
    if (String(FIELDS.mobile.value || '').trim().length < 7) { flash('Please enter a valid mobile number.'); return; }

    var email = String(FIELDS.email.value || '').trim();
    if (email && (email.indexOf('@') === -1 || email.indexOf('.') === -1)) { flash('Please enter a valid email, or leave it blank.'); return; }

    var ci = FIELDS.checkin.value, co = FIELDS.checkout.value;
    if (new Date(co) < new Date(ci)) { flash('Check-out cannot be before check-in.'); return; }

    var days = daysBetween();
    var payload = {
      riderName:       String(FIELDS.name.value).trim(),
      dlNumber:        String(FIELDS.license.value).trim(),
      cottageName:     FIELDS.cottage.value,
      mobile:          String(FIELDS.mobile.value).trim(),
      altMobile:       String(FIELDS.altMobile.value).trim(),
      email:           email,
      checkIn:         ci,
      checkOut:        co,
      days:            days,
      consentAccepted: true,
      consentAt:       new Date().toISOString()
    };

    setSubmitting(true);
    google.script.run
      .withSuccessHandler(function (res) {
        setSubmitting(false);
        if (res && res.success) { showSuccess(res, payload); }
        else { flash((res && res.message) || 'Something went wrong. Please try again.'); }
      })
      .withFailureHandler(function (err) {
        setSubmitting(false);
        flash((err && err.message) || 'Could not reach the desk. Please try again.');
      })
      .createPendingBooking(payload);
  }

  function setSubmitting(on) {
    submitting = on;
    els.submitBtn.classList.toggle('is-disabled', on);
    els.submitLabel.textContent = on ? 'Sending…' : 'Accept & send to desk';
    els.submitArrow.classList.toggle('hidden', on);
  }

  // ── Live availability banner ─────────────────────────────────────────────
  // n = count of scooters free right now (from getPublicSettings). 0 shows an
  // honest "none free" state rather than hiding the banner.
  function renderAvailability(n) {
    if (!els.availBanner) return;
    if (n == null || isNaN(n)) { els.availBanner.classList.add('hidden'); return; }
    n = Math.max(0, Math.round(Number(n)));
    var free = n > 0;
    els.availText.textContent = free
      ? (n + (n === 1 ? ' scooter' : ' scooters') + ' free right now')
      : 'No scooters free right now — the desk can advise on the wait';
    els.availBanner.style.background  = free ? 'var(--pine-tint)' : 'var(--terra-tint)';
    els.availBanner.style.borderColor = free ? 'var(--pine-line)' : 'var(--terra-tint)';
    els.availBanner.style.color       = free ? 'var(--pine-soft)' : 'var(--terra)';
    els.availDot.style.background     = free ? 'var(--pine-soft)' : 'var(--terra)';
    els.availBanner.classList.remove('hidden');
  }

  // ── Share / copy the booking on the success screen ───────────────────────
  // Plain-text summary: id, name, dates, vehicle type, price. Used by both the
  // guest's own WhatsApp share (wa.me with NO business number) and copy-to-clipboard.
  function bookingShareText() {
    if (!lastBooking) return '';
    var r = lastBooking.res, p = lastBooking.payload;
    return [
      'Sthira EV Rental — booking request',
      'Ref: ' + (r.bookingId || '—'),
      'Rider: ' + p.riderName,
      'Cottage: ' + (p.cottageName || '—'),
      'Dates: ' + fmtShort(p.checkIn) + ' → ' + fmtShort(p.checkOut) + ' (' + p.days + (p.days === 1 ? ' day' : ' days') + ')',
      'Vehicle: Electric scooter',
      'Estimate: ' + inr(r.rentAmount) + ' rent + ' + inr(r.depositAmount) + ' deposit (pay at the desk)'
    ].join('\n');
  }

  function shareWhatsApp() {
    var t = bookingShareText();
    if (!t) return;
    // No phone number → wa.me opens the guest's own chat/share picker.
    window.open('https://wa.me/?text=' + encodeURIComponent(t), '_blank');
  }

  function copyDetails() {
    var t = bookingShareText();
    if (!t) return;
    function done() { flash('Details copied.'); }
    function fallback() {
      try {
        var ta = document.createElement('textarea');
        ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done();
      } catch (e) { flash('Could not copy — please copy the details manually.'); }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(done, fallback);
    } else { fallback(); }
  }

  function showSuccess(res, payload) {
    lastBooking = { res: res, payload: payload };
    var first = (payload.riderName || 'rider').split(' ')[0];
    var now = new Date();
    els.okFirstName.textContent = first;
    els.okRef.textContent = res.bookingId || '—';
    els.okRider.textContent = payload.riderName;
    els.okCottage.textContent = payload.cottageName || '—';
    els.okDates.textContent = fmtShort(payload.checkIn) + ' → ' + fmtShort(payload.checkOut);
    els.okAcceptedAt.textContent = now.toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' });

    // Honest email copy: only promise an email if the guest actually gave one (and the
    // confirmation is sent when the desk confirms — see Bookings.gs / Email.gs).
    if (els.okEmailLine) {
      els.okEmailLine.textContent = payload.email
        ? ' A confirmation email will arrive at ' + payload.email + ' once the desk confirms your booking.'
        : '';
    }

    els.formScreen.classList.add('hidden');
    els.footerBar.classList.add('hidden');
    els.successScreen.classList.remove('hidden');
    els.successScreen.classList.add('anim-fade');
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
    if (KIOSK) { clearTimeout(kioskTimer); kioskTimer = setTimeout(reset, 12000); }
  }

  function reset() {
    clearTimeout(kioskTimer);
    accepted = {}; undertaking = false; submitting = false; lastBooking = null;
    Object.keys(FIELDS).forEach(function (k) { if (k !== 'cottage') FIELDS[k].value = ''; });
    els.undertakingToggle.classList.remove('on');
    els.undertakingCard.style.background = 'var(--paper-hi)';
    els.undertakingCard.style.borderColor = 'var(--line-3)';
    els.pricePreview.classList.add('hidden');
    prefillDates();
    renderTerms();
    els.successScreen.classList.add('hidden');
    els.formScreen.classList.remove('hidden');
    els.footerBar.classList.remove('hidden');
    setSubmitting(false);
    try { window.scrollTo({ top: 0 }); } catch (e) {}
  }

  // ── Map preview ────────────────────────────────────────────────────────
  function showMap(fileId) {
    if (!fileId) return;
    var img = els.mapImg;
    img.onload = function () { els.mapSection.classList.remove('hidden'); };
    img.onerror = function () { els.mapSection.classList.add('hidden'); };
    img.src = 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(fileId) + '&sz=w1600';
  }

  // ── Map zoom + pan ──────────────────────────────────────────────────────
  // The frame is a fixed clipping viewport ("the TV") — it never moves. Only the
  // image inside is transformed: two-finger pinch or ctrl+scroll-wheel to zoom.
  // At rest (scale 1) one finger scrolls the page normally — the map never traps
  // page scrolling. Once zoomed, one finger / mouse-drag pans the image, and after
  // ~3s of no interaction it eases back to fit (which also frees page scrolling again).
  function wireMapZoom() {
    var img = els.mapImg, frame = document.getElementById('mapFrame');
    if (!img || !frame) return;
    var MIN = 1, MAX = 4, RESET_MS = 3000;
    var scale = 1, tx = 0, ty = 0;              // current transform
    var pts = {};                                // active pointers id -> {x,y}
    var sDist = 0, sScale = 1, sTx = 0, sTy = 0, sMidX = 0, sMidY = 0;  // pinch start
    var panId = null, panX = 0, panY = 0;        // single-finger pan
    var idle = null;

    function apply(animate) {
      img.style.transition = animate ? 'transform .45s cubic-bezier(.22,.61,.36,1)' : 'none';
      img.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
      var isZoomed = scale > 1.01;
      frame.classList.toggle('zoomed', isZoomed);
      // At rest, hand single-finger touch back to the browser (page scroll); once
      // zoomed, claim it fully so one finger pans the image instead. Every reset
      // path (idle timeout, dblclick reset, pinch back to 1) runs through here.
      frame.style.touchAction = isZoomed ? 'none' : 'pan-y';
    }
    function clamp() {
      var fw = frame.clientWidth, fh = frame.clientHeight;
      var iw = img.clientWidth * scale, ih = img.clientHeight * scale;
      tx = iw <= fw ? (fw - iw) / 2 : Math.min(0, Math.max(fw - iw, tx));
      ty = ih <= fh ? (fh - ih) / 2 : Math.min(0, Math.max(fh - ih, ty));
    }
    function scheduleReset() {
      if (idle) clearTimeout(idle);
      idle = setTimeout(function () { scale = 1; tx = 0; ty = 0; clamp(); apply(true); }, RESET_MS);
    }
    function zoomAt(fx, fy, ns) {                 // keep frame-point (fx,fy) fixed
      ns = Math.max(MIN, Math.min(MAX, ns));
      var k = ns / scale;
      tx = fx - (fx - tx) * k; ty = fy - (fy - ty) * k; scale = ns;
      clamp(); apply(false);
    }
    function frameXY(e) { var r = frame.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }

    frame.addEventListener('pointerdown', function (e) {
      // Don't capture / claim a lone pointer at rest — let it fall through to the
      // browser as a normal page-scroll touch. Only claim it once it's part of a
      // pinch (2nd pointer) or a pan-while-zoomed gesture.
      pts[e.pointerId] = { x: e.clientX, y: e.clientY };
      var ids = Object.keys(pts);
      if (ids.length === 2) {
        try { frame.setPointerCapture(e.pointerId); } catch (x) {}
        var a = pts[ids[0]], b = pts[ids[1]], r = frame.getBoundingClientRect();
        sDist = Math.hypot(a.x - b.x, a.y - b.y); sScale = scale; sTx = tx; sTy = ty;
        sMidX = (a.x + b.x) / 2 - r.left; sMidY = (a.y + b.y) / 2 - r.top;
      } else if (ids.length === 1 && scale > 1.01) {
        try { frame.setPointerCapture(e.pointerId); } catch (x) {}
        panId = e.pointerId; panX = e.clientX; panY = e.clientY;
      }
      if (idle) clearTimeout(idle);
    });
    frame.addEventListener('pointermove', function (e) {
      if (!pts[e.pointerId]) return;
      pts[e.pointerId] = { x: e.clientX, y: e.clientY };
      var ids = Object.keys(pts);
      if (ids.length === 2 && sDist > 0) {
        var a = pts[ids[0]], b = pts[ids[1]];
        var ns = Math.max(MIN, Math.min(MAX, sScale * (Math.hypot(a.x - b.x, a.y - b.y) / sDist)));
        var k = ns / sScale;
        tx = sMidX - (sMidX - sTx) * k; ty = sMidY - (sMidY - sTy) * k; scale = ns;
        clamp(); apply(false);
      } else if (panId === e.pointerId) {
        tx += e.clientX - panX; ty += e.clientY - panY; panX = e.clientX; panY = e.clientY;
        clamp(); apply(false);
      }
    });
    function endPointer(e) {
      delete pts[e.pointerId];
      if (panId === e.pointerId) panId = null;
      if (Object.keys(pts).length < 2) sDist = 0;
      scheduleReset();
    }
    frame.addEventListener('pointerup', endPointer);
    frame.addEventListener('pointercancel', endPointer);
    // Two-finger touch: stop the browser's own page-pinch so our pinch math above
    // (driven by pointermove) is the only thing that zooms. Single-finger touch at
    // rest is left alone so the page scrolls; single-finger touch while zoomed also
    // needs preventDefault so the pan above isn't fighting a page scroll.
    frame.addEventListener('touchmove', function (e) {
      if (e.touches.length >= 2 || scale > 1.01) e.preventDefault();
    }, { passive: false });
    frame.addEventListener('wheel', function (e) {
      // Plain wheel/trackpad scroll over the map should scroll the page, like any
      // other content. Only claim it as a zoom gesture when ctrl is held (trackpad
      // pinch / ctrl+wheel) or the map is already zoomed in.
      if (!(e.ctrlKey || scale > 1.01)) return;
      e.preventDefault();
      var xy = frameXY(e); zoomAt(xy[0], xy[1], scale * (e.deltaY < 0 ? 1.15 : 0.87));
      scheduleReset();
    }, { passive: false });
    // Mouse users: double-click to zoom in a step, or reset if already zoomed.
    frame.addEventListener('dblclick', function (e) {
      var xy = frameXY(e); zoomAt(xy[0], xy[1], scale > 1.01 ? 1 : 2.2); scheduleReset();
    });
  }

  // ── Light / dark theme (shared toggle; same key as the desk) ──
  var R_MOON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  var R_SUN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  function riderDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
  function setRiderThemeIcon() { var b = document.getElementById('riderThemeBtn'); if (b) b.innerHTML = riderDark() ? R_SUN : R_MOON; }
  function toggleRiderTheme() { var d = document.documentElement; if (riderDark()) d.removeAttribute('data-theme'); else d.setAttribute('data-theme', 'dark'); try { localStorage.setItem('sthira_theme', riderDark() ? 'dark' : 'light'); } catch (e) {} setRiderThemeIcon(); }

  // ── Cottage dropdown ───────────────────────────────────────────────────
  function fillCottages(list) {
    var sel = FIELDS.cottage;
    sel.innerHTML = '';
    var ph = document.createElement('option');
    ph.value = ''; ph.textContent = 'Select your cottage…';
    sel.appendChild(ph);
    (list || []).forEach(function (name) {
      var o = document.createElement('option');
      o.value = name; o.textContent = name;
      sel.appendChild(o);
    });
    if (!list || !list.length) { ph.textContent = 'Ask the desk to add cottages'; }
  }

  function todayIso() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Default both dates to today and show an instant price — but never clobber values
  // the browser restored (bfcache / back-navigation) or the guest already picked.
  function prefillDates() {
    var iso = todayIso();
    FIELDS.checkin.min = iso;
    FIELDS.checkout.min = iso;
    if (!FIELDS.checkin.value)  FIELDS.checkin.value  = iso;
    if (!FIELDS.checkout.value) FIELDS.checkout.value = FIELDS.checkin.value || iso;
    FIELDS.checkout.min = FIELDS.checkin.value || iso;
    updatePrice();
  }

  // ── Boot ───────────────────────────────────────────────────────────────
  function boot() {
    prefillDates();

    // wire static handlers
    els.undertakingToggle.addEventListener('click', toggleUndertaking);
    els.submitBtn.addEventListener('click', submit);
    els.resetBtn.addEventListener('click', reset);
    if (els.waShareBtn) els.waShareBtn.addEventListener('click', shareWhatsApp);
    if (els.copyDetailsBtn) els.copyDetailsBtn.addEventListener('click', copyDetails);
    wireMapZoom();
    var rtb = document.getElementById('riderThemeBtn');
    if (rtb) { setRiderThemeIcon(); rtb.addEventListener('click', toggleRiderTheme); }
    Object.keys(FIELDS).forEach(function (k) {
      FIELDS[k].addEventListener('input', updateProgress);
      FIELDS[k].addEventListener('change', updateProgress);
    });
    // Mobile fields accept digits, +, and spaces only.
    ['mobile', 'altMobile'].forEach(function (k) {
      FIELDS[k].addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/[^\d+\s]/g, '');
      });
    });
    FIELDS.checkin.addEventListener('change', function () {
      if (FIELDS.checkout.value && FIELDS.checkout.value < FIELDS.checkin.value) FIELDS.checkout.value = FIELDS.checkin.value;
      FIELDS.checkout.min = FIELDS.checkin.value || todayIso();
      updatePrice();
    });
    FIELDS.checkout.addEventListener('change', updatePrice);

    // load terms
    loadTerms();

    // load cottages
    google.script.run
      .withSuccessHandler(fillCottages)
      .withFailureHandler(function () { fillCottages([]); })
      .getPublicCottages();

    // load public settings (rates + map)
    google.script.run
      .withSuccessHandler(function (s) {
        if (s) {
          rates.dayRate = Number(s.dayRate) || 300;
          rates.depositPerWeek = Number(s.depositPerWeek) || 2000;
          showMap(s.mapEmailFileId || s.mapDriveFileId);
          var rw = $('rentalsWindowNote');
          if (rw && s.rentalStartTime && s.rentalEndTime) {
            rw.textContent = 'Rental day runs ' + window.Sthira.to12h(s.rentalStartTime) + ' – ' + window.Sthira.to12h(s.rentalEndTime) + '. Returning on a later date counts as another day.';
          }
          renderAvailability(s.availableCount);
        }
        updatePrice();
      })
      .withFailureHandler(function () {})
      .getPublicSettings();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
