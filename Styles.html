<!-- Styles.html — shared style partial (Sthira design system). Included by RiderForm + Admin. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAE0; --paper-hi:#F3EFE6; --card:#FFFCF6; --card-2:#F6F2E9;
    --pine:#2F5D50; --pine-soft:#3E6B5B; --pine-tint:#EAF1E6; --pine-line:#CADAC8;
    --terra:#A4452C; --terra-2:#B4452F; --terra-tint:#FBE7DF;
    --gold:#C68A2E; --gold-deep:#A6731E; --gold-tint:#FAEEDD;
    --ink:#23211C; --muted:#6F6A5C; --muted-2:#8C8576; --faint:#9A9384;
    --line:#EBE4D6; --line-2:#E0D8C8; --line-3:#E4DDCE;
    --serif:'Newsreader',Georgia,serif;
    --ui:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:'Spline Sans Mono',ui-monospace,'Courier New',monospace;
    --shadow-sm:0 1px 2px rgba(60,50,30,.04);
    --shadow:0 6px 18px rgba(47,93,80,.3);
    --radius:22px; --radius-md:16px; --radius-sm:13px;
    /* semantic surface/text tokens (light values == the old literals, so light mode
       is unchanged; the dark theme below remaps them all together) */
    --txt-2:#5C5648; --surface:#FBF8F1; --surface-2:#F1ECE0; --hair:#F1EADB;
    --topbar:rgba(239,234,224,.86);
    --toast-bg:#2B2A24; --toast-fg:#F5F0E7;
  }
  /* ── Dark theme (tasteful warm charcoal; flips every token at once) ── */
  [data-theme="dark"]{
    --paper:#161512; --paper-hi:#1C1B17; --card:#222019; --card-2:#2A2823;
    --pine:#5E9B7A; --pine-soft:#74B193; --pine-tint:#243029; --pine-line:#37493F;
    --terra:#D98E6A; --terra-2:#CB7048; --terra-tint:#36231C;
    --gold:#D9AC55; --gold-deep:#D9AC55; --gold-tint:#332A18;
    --ink:#ECE7DD; --muted:#A8A192; --muted-2:#938C7E; --faint:#7E7768;
    --line:#312E29; --line-2:#3A372F; --line-3:#3A372F;
    --txt-2:#BDB6A8; --surface:#262420; --surface-2:#2D2B26; --hair:#322F2A;
    --topbar:rgba(20,19,16,.86);
    --toast-bg:#34322B; --toast-fg:#ECE7DD;
    --shadow:0 6px 18px rgba(0,0,0,.45);
  }
  [data-theme="dark"] ::selection{background:#5E9B7a33;}
  [data-theme="dark"] ::-webkit-scrollbar-thumb{background:#3A372F;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--ui); background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition: background-color 0s, color 0s;
  }
  ::selection{background:#2F5D5022;}
  input,select,button,textarea{font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pine) !important;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#D6CEBE;border-radius:8px;border:3px solid transparent;background-clip:content-box;}
  a{color:var(--pine);}

  /* ── Typography helpers ── */
  .serif{font-family:var(--serif);font-weight:500;}
  .mono{font-family:var(--mono);}
  .eyebrow{font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .eyebrow-sm{font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .muted{color:var(--muted);}

  /* ── Layout ── */
  .wrap{max-width:760px;margin:0 auto;padding:0 22px;}

  /* ── Cards ── */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;}
  .card-soft{background:var(--paper-hi);border:1px solid var(--line-3);border-radius:var(--radius);padding:26px;}

  /* ── Pills / badges ── */
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;padding:6px 12px;border-radius:999px;}
  .pill .dot{width:8px;height:8px;border-radius:50%;}
  .pill-pine{color:var(--pine-soft);background:var(--pine-tint);} .pill-pine .dot{background:var(--pine-soft);}
  .pill-terra{color:var(--terra);background:var(--terra-tint);} .pill-terra .dot{background:var(--terra);}
  .pill-gold{color:var(--gold-deep);background:var(--gold-tint);} .pill-gold .dot{background:var(--gold-deep);}
  .badge-strict{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--terra);background:var(--terra-tint);padding:3px 9px;border-radius:999px;}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;cursor:pointer;
       font-weight:600;font-size:15px;padding:14px 22px;border-radius:14px;transition:background .2s,transform .05s;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--pine);color:#fff;box-shadow:var(--shadow);}
  .btn-primary[disabled],.btn-primary.is-disabled{background:var(--surface-2);color:var(--muted-2);cursor:not-allowed;box-shadow:none;}
  .btn-ghost{background:none;color:var(--pine);box-shadow:none;}

  /* ── Form fields ── */
  .field-label{font-size:12.5px;color:var(--muted-2);font-weight:600;display:block;margin-bottom:7px;}
  .field-label .req{color:var(--terra-2);}
  .field{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface);
         font-size:14.5px;color:var(--ink);transition:border-color .15s;}
  .field::placeholder{color:var(--faint);}
  /* iOS Safari auto-zooms on focus into any input under 16px — bump it back up on phones only. */
  @media(max-width:640px){ .field{font-size:16px;} }

  /* ── Accept toggle (tap-to-accept term cards) ── */
  .toggle{display:flex;align-items:center;gap:11px;width:100%;justify-content:flex-start;
          padding:11px 16px;border-radius:13px;border:1px solid var(--line-2);background:var(--surface);
          color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
  .toggle .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-2);background:transparent;
               display:flex;align-items:center;justify-content:center;flex:none;transition:.2s;}
  .toggle .box svg{opacity:0;transition:opacity .15s;}
  .toggle.on{border-color:var(--pine);background:var(--pine-tint);color:var(--pine);}
  .toggle.on .box{border-color:var(--pine);background:var(--pine);}
  .toggle.on .box svg{opacity:1;}

  /* ── Section number chip ── */
  .num{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--faint);background:var(--surface-2);
       width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;transition:.2s;}
  .term.on .num{color:var(--pine);background:var(--pine-tint);}
  .term{transition:border-color .2s,box-shadow .2s;margin-bottom:16px;}
  .term.on{border-color:var(--pine-line);box-shadow:0 0 0 3px rgba(47,93,80,.08);}
  .accept-toggle{margin-top:20px;}

  /* ── Animations ── */
  @keyframes agFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes agPop{from{transform:scale(.9);}to{transform:scale(1);}}
  @keyframes shShake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
  .anim-fade{animation:agFade .4s ease both;}
  .anim-pop{animation:agPop .4s cubic-bezier(.2,.9,.3,1.2) both;}
  @keyframes skPulse{0%,100%{opacity:.5;}50%{opacity:.85;}}
  .sk{animation:skPulse 1.1s ease-in-out infinite;}

  /* ── Vehicle card motion (Fleet / Yard) ──────────────────────────────────
     A vehicle card is rebuilt via innerHTML on every render, so a status
     change/add/remove used to teleport with zero motion. These classes give
     just the card the user acted on a gentle settle-in (charge toggle, add)
     or fade-out (delete) — never the whole grid, and never a pulse re-render
     (that's gated in JS by only ever tagging the single acted-on card). */
  @keyframes vcSettle{from{opacity:0;transform:translateY(4px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .vehicle-card{transition:opacity .22s ease-out,transform .22s ease-out;}
  .vehicle-card.vc-settle{animation:vcSettle .22s ease-out both;}
  .vehicle-card.vc-leaving{opacity:0;transform:scale(.94);}
  @media (prefers-reduced-motion:reduce){
    .vehicle-card{transition:none;}
    .vehicle-card.vc-settle{animation:none;}
  }

  /* ── Toast ── */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:80;
         background:var(--toast-bg);color:var(--toast-fg);padding:13px 20px;border-radius:13px;font-size:14px;font-weight:500;
         box-shadow:0 12px 40px rgba(20,15,8,.35);max-width:90vw;text-align:center;
         opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.danger{background:#7A2E1E;color:#F4E8E2;}

  /* ── Spinner ── */
  .spin{width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;
        display:inline-block;animation:agSpin .7s linear infinite;}
  @keyframes agSpin{to{transform:rotate(360deg);}}
  .hidden{display:none !important;}

  /* ── Printable receipt (deposit / refund) ──────────────────────────────
     The .print-receipt block is injected into <body> only while printing and
     removed afterward. On screen it's hidden; @media print hides the whole app
     and shows just the receipt, so window.print() yields a clean slip. */
  .print-receipt{display:none;}
  .print-receipt .pr-head{text-align:center;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
  .print-receipt .pr-brand{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:.02em;color:var(--ink);}
  .print-receipt .pr-sub{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .print-receipt .pr-meta{margin-bottom:18px;}
  .print-receipt .pr-meta-row{display:flex;justify-content:space-between;gap:18px;padding:6px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
  .print-receipt .pr-meta-row span:first-child{color:var(--muted);} .print-receipt .pr-meta-row span:last-child{font-weight:600;text-align:right;color:var(--ink);}
  .print-receipt .pr-money{border:1px solid var(--line-2);border-radius:12px;padding:14px 16px;background:var(--surface);}
  .print-receipt .pr-line{display:flex;justify-content:space-between;gap:18px;padding:6px 0;font-size:14px;color:var(--ink);}
  .print-receipt .pr-line.pr-minus span:last-child{color:var(--terra);}
  .print-receipt .pr-line.pr-total{font-weight:700;font-size:15.5px;border-top:1px solid var(--line-2);margin-top:6px;padding-top:10px;}
  .print-receipt .pr-rule{border-top:1px dashed var(--line-2);margin:8px 0;}
  .print-receipt .pr-foot{margin-top:20px;text-align:center;font-size:12px;color:var(--muted);}
  @media print{
    body.printing>*{display:none !important;}
    body.printing .print-receipt{display:block !important;max-width:480px;margin:0 auto;padding:24px;color:#000;}
    body.printing .print-receipt .pr-brand,body.printing .print-receipt .pr-meta-row span:last-child,body.printing .print-receipt .pr-line{color:#000;}
    body.printing .print-receipt .pr-money{background:#fff;}
  }
</style>
